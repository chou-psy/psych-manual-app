<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心理使用手冊</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 16px;
  color: #222;
}

h1 {
  font-size: 20px;
  margin-bottom: 16px;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 12px;
}

button {
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  background: #333;
  color: white;
  margin-top: 10px;
}

select, textarea {
  width: 100%;
  margin-top: 8px;
  padding: 8px;
}
</style>
</head>

<body>

<h1>心理使用手冊</h1>

<div class="card">
  <div>今天的你，比較接近哪一種狀態</div>
  <select id="state">
    <option>想躲起來</option>
    <option>一直撐著</option>
    <option>很空</option>
    <option>心裡很吵</option>
    <option>有一點平靜</option>
  </select>

  <div>身體現在比較有感的是哪裡</div>
  <select id="body">
    <option>胸口緊</option>
    <option>肩頸硬</option>
    <option>頭脹</option>
    <option>沒什麼感覺</option>
  </select>

  <div>有沒有一個片段想留下來</div>
  <textarea id="note"></textarea>

  <button onclick="saveEntry()">送出</button>
</div>

<div class="card" id="feedback"></div>

<div class="card">
  <button onclick="showRecords()">查看紀錄</button>
</div>

<div class="card" id="records"></div>

<script>
function getEntries() {
  return JSON.parse(localStorage.getItem("entries") || "[]");
}

function saveEntry() {
  const state = document.getElementById("state").value;
  const body = document.getElementById("body").value;
  const note = document.getElementById("note").value;

  const entry = {
    date: new Date().toISOString(),
    state,
    body,
    note
  };

  const entries = getEntries();
  entries.push(entry);
  localStorage.setItem("entries", JSON.stringify(entries));

  showFeedback(state);
}

function showFeedback(state) {
  let text = "";

  if (state === "一直撐著") {
    text = "今天的你，花了不少力氣讓事情維持在表面正常。";
  } else if (state === "想躲起來") {
    text = "有一部分的你，暫時把自己收了起來。";
  } else if (state === "很空") {
    text = "這種空掉的感覺，先留下來就好。";
  } else if (state === "心裡很吵") {
    text = "有些東西在裡面同時發生，還沒整理好。";
  } else {
    text = "這一筆可以先留著，不需要急著理解。";
  }

  document.getElementById("feedback").innerText = text;
}

function showRecords() {
  const entries = getEntries();
  const container = document.getElementById("records");
  container.innerHTML = "";

  entries.slice().reverse().forEach(e => {
    const div = document.createElement("div");
    div.innerHTML = `
      <div>${e.date}</div>
      <div>${e.state} / ${e.body}</div>
      <div>${e.note}</div>
      <hr/>
    `;
    container.appendChild(div);
  });
}
</script>

</body>
</html>
