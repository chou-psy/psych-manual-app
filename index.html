<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psych Manual v8</title>
<style>
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: radial-gradient(circle at 30% 30%, #1f2a28, #111);
  color:#eee;
}
.container {
  max-width:500px;
  margin:40px auto;
  padding:30px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  border-radius:20px;
}
h2 {
  font-weight:500;
  margin-bottom:10px;
}
.grid {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
.btn {
  padding:10px 14px;
  border-radius:20px;
  background: rgba(255,255,255,0.08);
  cursor:pointer;
}
.btn.active {
  background: rgba(180,220,200,0.4);
}
#sphere {
  width:120px;
  height:120px;
  border-radius:50%;
  margin:30px auto;
  background: radial-gradient(circle,#8fd3c1,#2c4a46);
  animation: breathe 4s infinite;
}
@keyframes breathe {
  0% { transform: scale(0.82); opacity:0.7;}
  50% { transform: scale(1.18); opacity:1;}
  100% { transform: scale(0.82); opacity:0.7;}
}
.alert {
  margin-top:20px;
  padding:15px;
  background: rgba(255,255,255,0.1);
  border-radius:12px;
  display:none;
}
</style>
</head>
<body>

<div class="container">
<h2>剛才的感受，與哪一個生活切面有關</h2>
<div id="context" class="grid"></div>

<h2>今天比較靠近哪幾種狀態</h2>
<div id="state" class="grid"></div>

<h2>身體哪裡先有了訊號</h2>
<div id="body" class="grid"></div>

<div id="sphere"></div>

<div id="alert" class="alert"></div>
</div>

<script>
const stateList = [
"一直撐著","想躲起來","心緒嘈雜","很煩","很空","有點麻木",
"不想說話","很想被理解","很想逃開","有點委屈","有點生氣","有點怕",
"提不起勁","想把事情做好","腦袋停不下來","覺得自己很糟",
"好像被卡住","不想再解釋","有點孤單","很想安靜",
"比較平靜","還可以","說不上來",
"感到無力","感到恐慌","心悸感","自我懷疑","過度警覺",
"感到不真實（解離感）","罪惡感","無助感","思緒飛揚","腦袋一片空白"
];

const bodyList = [
"胸口緊","肩頸硬","頭脹","胃不舒服","呼吸變淺","身體很重",
"想睡","坐立難安","心跳變快","喉嚨卡住","眼睛酸","手腳冰冷",
"背很緊","下巴咬緊","肚子緊","全身沒力","手心出汗",
"皮膚緊繃","腦袋發熱","沒什麼感覺","比較放鬆","有一點力氣","說不上來",
"磨牙","肌肉抽搐","頭暈","噁心感","全身發抖","皮膚發癢","忽冷忽熱"
];

const contextList = [
"工作","家人","伴侶","朋友","金錢","健康","睡眠","社群媒體",
"自我要求","未來","回憶","人際訊息","時間壓力","身體不舒服",
"突來的安靜","沒有特定事件",
"課業壓力","環境改變","突發事件","法律問題","政治或社會事件"
];

let selected = {state:[], body:[], context:[]};

function render(list, id, type){
  const el = document.getElementById(id);
  list.forEach(item=>{
    const b = document.createElement('div');
    b.className='btn';
    b.innerText=item;
    b.onclick=()=>{
      b.classList.toggle('active');
      if(selected[type].includes(item)){
        selected[type]=selected[type].filter(x=>x!==item);
      } else {
        selected[type].push(item);
      }
      checkPattern();
      updateSphere();
    };
    el.appendChild(b);
  });
}

function updateSphere(){
  const sphere = document.getElementById('sphere');
  if(selected.state.includes("心緒嘈雜")) {
    sphere.style.background = "radial-gradient(circle,#e6b980,#7a3e1d)";
  }
  if(selected.state.includes("比較平靜")) {
    sphere.style.background = "radial-gradient(circle,#9be7c4,#2f6f5e)";
  }
}

function checkPattern(){
  const alert = document.getElementById('alert');
  if(selected.context.includes("工作") &&
     selected.context.includes("時間壓力") &&
     selected.state.includes("腦袋停不下來")){
    alert.style.display='block';
    alert.innerText = "偵測到壓力前兆：工作與時間壓力常會引發思緒過載與身體緊繃，可以先慢一點。";
  }
}

render(contextList,"context","context");
render(stateList,"state","state");
render(bodyList,"body","body");
</script>

</body>
</html>
