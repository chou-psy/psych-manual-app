<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心理使用手冊</title>

<style>
body{
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
  background:#f7f5f2;
  color:#1c1c1c;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.6) 1px, transparent 2px),
    radial-gradient(circle at 70% 60%, rgba(255,255,255,0.5) 1px, transparent 2px);
  animation: drift 20s linear infinite;
}
@keyframes drift{
  from{transform:translateY(0)}
  to{transform:translateY(80px)}
}

.container{
  max-width:460px;
  margin:0 auto;
  padding:40px 20px 100px;
}

.brand{
  font-size:13px;
  letter-spacing:0.2em;
  color:#888;
  margin-bottom:12px;
}

.title{
  font-family: "Times New Roman", serif;
  font-size:34px;
  line-height:1.2;
}

.date{
  margin-top:12px;
  font-size:14px;
  color:#999;
}

.card{
  background:#ffffff;
  border-radius:20px;
  padding:24px;
  margin-top:20px;
  border:1px solid #eee;
}

.section{
  margin-bottom:18px;
}

.label{
  font-size:15px;
  margin-bottom:8px;
}

select, textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

textarea{
  min-height:100px;
}

.primary{
  text-align:right;
  margin-top:12px;
}

button{
  background:none;
  border:none;
  font-size:14px;
  color:#333;
}

.feedback{
  margin-top:20px;
  font-size:15px;
  line-height:1.8;
}

.records{
  margin-top:20px;
  font-size:13px;
  color:#666;
}
</style>
</head>

<body>

<div class="container">

<div class="brand">PERSONAL NOTE</div>
<div class="title">今天，留下<br>一點自己的痕跡</div>
<div class="date" id="date"></div>

<div class="card">
  <div class="section">
    <div class="label">今天的狀態</div>
    <select id="state">
      <option>一直撐著</option>
      <option>想躲起來</option>
      <option>心裡很吵</option>
      <option>很空</option>
      <option>提不起勁</option>
    </select>
  </div>

  <div class="section">
    <div class="label">身體感受</div>
    <select id="body">
      <option>胸口緊</option>
      <option>肩頸硬</option>
      <option>頭脹</option>
      <option>沒感覺</option>
    </select>
  </div>

  <div class="section">
    <div class="label">片段</div>
    <textarea id="note"></textarea>
  </div>

  <div class="primary">
    <button onclick="save()">送出</button>
  </div>
</div>

<div class="feedback" id="feedback"></div>
<div class="records" id="records"></div>

</div>

<script>
function setDate(){
  const d=new Date();
  document.getElementById("date").innerText=
  d.getFullYear()+"."+ (d.getMonth()+1)+"."+d.getDate();
}

function save(){
  const state=document.getElementById("state").value;
  const body=document.getElementById("body").value;
  const note=document.getElementById("note").value;

  const entry={state,body,note,time:new Date().toISOString()};
  const data=JSON.parse(localStorage.getItem("data")||"[]");
  data.push(entry);
  localStorage.setItem("data",JSON.stringify(data));

  document.getElementById("feedback").innerText=getFeedback(state);
  render();
}

function getFeedback(state){
  if(state==="一直撐著") return "你花了很多力氣維持運作。";
  if(state==="想躲起來") return "你暫時讓自己離開了一點。";
  return "這一筆先留下來。";
}

function render(){
  const data=JSON.parse(localStorage.getItem("data")||"[]");
  document.getElementById("records").innerHTML=
  data.slice().reverse().map(d=>`${d.state}/${d.body}<br>${d.note||""}<br><br>`).join("");
}

setDate();
render();
</script>

</body>
</html>
